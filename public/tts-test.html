<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>TTS 测试</title>
<style>
body{font-family:sans-serif;padding:40px;max-width:600px;margin:auto}
button{padding:12px 24px;font-size:16px;cursor:pointer;border-radius:8px}
#log{margin-top:16px;padding:12px;background:#f5f5f5;white-space:pre-wrap;font-size:13px;max-height:300px;overflow-y:auto}
audio{width:100%;margin-top:10px;display:none}
</style></head><body>
<h2>🔊 服务端 TTS 测试（云扬老年男声）</h2>

<p>测试文本：</p>
<input id="txt" value="您好，我是脉大夫，今天感觉怎么样？" style="width:100%;padding:10px;font-size:14px">

<button onclick="doSpeak()" style="background:#7b8c76;color:#fff;border:none">▶ 播放</button>
<button onclick="stopAudio()" style="background:#ccc;color:#333;border:none">⏹ 停止</button>

<audio id="player" controls></audio>

<div id="log"></div>

<script>
let serverAudio = null;

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += '\n[' + new Date().toLocaleTimeString() + '] ' + msg;
  console.log(msg);
}

function stopAudio() {
  const p = document.getElementById('player');
  p.pause();
  if (serverAudio) { serverAudio.pause(); serverAudio = null; }
}

async function doSpeak() {
  stopAudio();
  const text = document.getElementById('txt').value.trim();
  log('开始合成: "' + text.substring(0, 30) + '"');

  try {
    log('→ 发送 POST /api/tts ...');
    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    
    log('← HTTP ' + resp.status);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const blob = await resp.blob();
    log('← 收到 blob: ' + blob.size + ' bytes, type: ' + blob.type);

    const url = URL.createObjectURL(blob);
    const player = document.getElementById('player');
    player.src = url;
    player.style.display = 'block';

    serverAudio = player;
    
    await player.play();
    log('✅ ▶ 播放成功！');
    player.onended = () => { log('🏁 播放结束'); };

  } catch(e) {
    log('❌ 失败: ' + e.message);
  }
}

// 页面加载时自动测试一次
window.onload = () => { log('页面就绪'); };
</script>
</body></html>
