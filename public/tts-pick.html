<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>声音对比 - 选老医生</title>
<style>
body{font-family:sans-serif;padding:30px;max-width:560px;margin:auto;background:#faf5f0}
h2{color:#7b8c76;text-align:center}
.card{background:#fff;border-radius:16px;padding:20px;margin:14px 0;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card h3{margin:0 0 10px;font-size:15px;color:#333}
.card p{font-size:12px;color:#888;margin:0 0 10px}
audio{width:100%;border-radius:8px}
.btn-choose{display:block;width:100%;padding:10px;margin-top:10px;border:none;border-radius:10px;background:#7b8c76;color:#fff;font-size:15px;cursor:pointer}
.btn-choose:hover{background:#6a7b66}
#winner{display:none;text-align:center;margin-top:24px;padding:20px;background:#e8f5e9;border-radius:16px;color:#2e7d32;font-size:18px;font-weight:bold}
</style></head><body>
<h2>🧓 选一个最像"脉大夫"的声音</h2>
<p style="text-align:center;color:#999;font-size:13px">点播放按钮听，选好后点对应卡片底部的"就这个"</p>

<div class="card">
  <h3>🎙️ 云扬 YunyangNeural（更慢更低沉版）</h3>
  <p>当前使用 · 语速-12% · 音调-10Hz · 温和老年</p>
  <audio src="/tts-yunyang-old.mp3" controls></audio>
  <button class="btn-choose" onclick="pick('云扬（更老版）','YunyangNeural','-12%','-10Hz')">✅ 就用这个</button>
</div>

<div class="card">
  <h3>🎙️ 云健 YunjianNeural</h3>
  <p>另一个老年男声 · 语速-10% · 音调-8Hz · 沉稳厚重</p>
  <audio src="/tts-yunjian.mp3" controls></audio>
  <button class="btn-choose" onclick="pick('云健','YunjianNeural','-10%','-8Hz')">✅ 就用这个</button>
</div>

<div id="winner"></div>

<script>
function pick(name, voice, rate, pitch) {
  document.getElementById('winner').style.display = 'block';
  document.getElementById('winner').innerHTML = '已选择：<br><span style="font-size:22px">「' + name + '」</span><br><br>' +
    '<button onclick="location.reload()" style="padding:8px 20px;border:none;border-radius:8px;background:#ccc;cursor:pointer;font-size:14px">🔄 重新选择</button>';
  console.log('SELECTED:', {name, voice, rate, pitch});
}
</script>
</body></html>
