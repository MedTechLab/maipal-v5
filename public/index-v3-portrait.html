<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>脉大夫</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap");
    :root{--green:#7b8c76;--beige:#D7C8B0;--beige-l:#f8f3ee;--text-dk:#2a2a2a;--text-1:#5a4a3a;--text-2:#6b5d4f;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;overflow:hidden;font-family:"Noto Sans SC",-apple-system,sans-serif;background:#000;color:var(--text-dk);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
    .app-shell{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(270deg);transform-origin:center center;width:100vh;height:100vw;background:#fff;overflow:hidden;}

    /* Background */
    .bg-layer{position:absolute;inset:0;z-index:0;pointer-events:none;}.bg-layer img{width:100%;height:100%;object-fit:cover;}
    .bg-gradient{position:absolute;top:50%;left:0;width:100%;bottom:0;z-index:0;pointer-events:none;
      background:linear-gradient(to bottom,rgba(248,243,238,0) 0%,rgba(248,243,238,.5)11.6%,rgba(249,244,239,.8)21.6%,rgba(249,244,239,.97)34.2%,#faf5f0 79.4%,#faf5f0 100%);}

    /* Header */
    .header{position:absolute;top:0;left:0;right:0;z-index:10;padding:53px 23px 16px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:auto;}
    .header-greeting p{filter:drop-shadow(0 3px 3px rgba(0,0,0,.12));height:36px;line-height:36px;font-size:32px;color:var(--green);margin:0;font-weight:normal;}
    .settings-btn{background:#f0e6dc;box-shadow:0 4px 4.75px rgba(185,185,185,.23);width:50px;height:66px;border-radius:10px;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
    .settings-btn:active{transform:scale(.95);}
    .settings-btn svg{width:24px;height:24px;margin-bottom:4px;}
    .settings-btn span{font-size:12px;color:var(--text-1);line-height:1;}

    /* Doctor */
    .doctor-wrap{position:absolute;top:-2%;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;}
    .doctor-img{height:95vw;max-height:1200px;width:auto;object-fit:contain;display:block;transition:opacity .3s ease;}
    .listening-badge{position:absolute;top:40px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:8px 16px;border-radius:9999px;font-size:14px;font-weight:500;box-shadow:0 4px 12px rgba(239,68,68,.35);white-space:nowrap;animation:lp 1s ease-in-out infinite;pointer-events:none;}
    @keyframes lp{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.08);}}

    /* Messages */
    .messages-area{position:absolute;left:24px;right:24px;top:145px;bottom:95px;z-index:30;overflow-y:auto;-webkit-overflow-scrolling:touch;
      -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 10%,black 92%,transparent 100%);mask-image:linear-gradient(to bottom,transparent 0%,black 10%,black 92%,transparent 100%);
      scrollbar-width:none;}.messages-area::-webkit-scrollbar{display:none;}
    .messages-inner{min-height:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;padding:16px 4px;}

    /* Bubbles - exact v3 spec */
    .msg-row{display:flex;animation:mIn .6s ease-out both;}.msg-row.user{justify-content:flex-end;}.msg-row.ai{justify-content:flex-start;}
    @keyframes mIn{from{opacity:0;transform:translateY(28px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
    .msg-row.old .ai-bubble{opacity:.65;}
    .msg-bubble{max-width:92%;padding:13px 17px;border-radius:20px;font-size:14px;line-height:26px;word-break:break-word;}
    .ai-bubble{background:rgba(255,255,255,.78);color:var(--text-dk);border:1.18px solid rgba(111,184,153,.12);box-shadow:0 2px 4px 0 rgba(0,0,0,.05);backdrop-filter:blur(2px);}
    .user-bubble{background:var(--green);color:#fff;box-shadow:0 3px 5px 0 rgba(0,0,0,.08);}

    .sp-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:4px 10px;font-size:11px;color:var(--text-2);background:transparent;border:1px solid rgba(123,140,118,.25);border-radius:12px;cursor:pointer;transition:all .2s;}
    .sp-btn:hover{color:var(--green);border-color:var(--green);}.sp-btn.on{color:#fff;background:var(--green);border-color:var(--green);}

    /* Loading dots */
    .loading-row{display:flex;justify-content:flex-start;animation:mIn .6s both;}
    .lbub{background:rgba(255,255,255,.78);padding:13px 17px;border-radius:20px;border:1.18px solid rgba(111,184,153,.12);backdrop-filter:blur(2px);display:flex;align-items:center;gap:8px;}
    .ld{width:8px;height:8px;border-radius:50%;background:var(--green);animation:lbd .8s ease-in-out infinite;}
    .ld:nth-child(2){animation-delay:.2s;}.ld:nth-child(3){animation-delay:.4s;}
    @keyframes lbd{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
    .ltxt{font-size:14px;color:var(--text-2);}

    /* Diagnosis card */
    .dcard{background:linear-gradient(135deg,#fdf6ec,#faf0df);border:1px solid #e8d4a8;border-radius:12px;padding:10px 12px;margin-top:4px;font-size:13px;line-height:1.65;}
    .dcard .tag{display:inline-block;background:var(--green);color:#fff;padding:2px 10px;border-radius:10px;font-size:11px;margin-bottom:6px;font-weight:500;}

    /* Markdown */
    .msg-bubble strong{font-weight:600;}.msg-bubble em{font-style:italic;opacity:.85;}
    .msg-bubble code{background:rgba(123,140,118,.1);padding:1px 5px;border-radius:4px;font-size:13px;}
    .msg-bubble pre{background:rgba(123,140,118,.08);border:1px solid rgba(123,140,118,.15);border-radius:8px;padding:10px;font-size:12px;overflow-x:auto;margin:6px 0;}
    .msg-bubble pre code{background:none;padding:0;}

    /* Quick Replies */
    .quick-replies{position:absolute;left:25px;right:25px;z-index:40;display:flex;gap:16px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;top:641px;transition:top .3s;}
    .quick-replies::-webkit-scrollbar{display:none;}
    .qrp{display:flex;align-items:center;gap:4px;height:35px;padding:0 12px;background:rgba(255,255,255,.9);box-shadow:0 4px 4px rgba(107,93,79,.1);border-radius:30px;border:none;font-size:14px;color:var(--text-1);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:transform .15s;font-family:inherit;}
    .qrp:active{transform:scale(.95);}

    /* Input Area */
    .input-area{position:absolute;left:25px;right:25px;z-index:40;height:51px;display:flex;align-items:center;bottom:28px;transition:bottom .3s;}
    .io{position:absolute;inset:0;background:rgba(255,255,255,.5);border-radius:30px;box-shadow:0 4px 8px 0 rgba(107,93,79,.05);}
    .ii{position:absolute;left:4px;right:55px;top:3px;bottom:3px;background:#fff;border-radius:30px;display:flex;align-items:center;padding:0 16px;gap:8px;}
    .ifield{flex:1;border:none;outline:none;background:transparent;font-size:14px;font-family:inherit;color:rgba(42,42,42,.8);min-width:0;}
    .ifield::placeholder{color:rgba(42,42,42,.5);}
    .micbtn{width:28px;height:28px;flex-shrink:0;border:none;background:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;margin-right:2px;}
    .micbtn.recording svg{stroke:#ef4444;}
    .sbtn{position:absolute;right:0;width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:none;padding:0;}
    .sbtn:active:not(:disabled){transform:scale(.95);}.sbtn:disabled{opacity:.45;}
    .rhint{position:absolute;left:25px;right:25px;z-index:39;text-align:center;font-size:12px;color:#ef4444;opacity:0;transition:opacity .2s;pointer-events:none;bottom:88px;}
    .rhint.show{opacity:1;}

    /* Perm Modal */
    .pmbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;animation:fI .45s forwards;backdrop-filter:blur(3px);}
    .pmmd{position:fixed;left:50%;top:50%;transform:translate(-50%,calc(-50%+28px));z-index:200;width:calc(100%-56px);max-width:340px;background:rgba(255,255,255,.95);backdrop-filter:blur(4px);border-radius:28px;box-shadow:0 16px 40px rgba(0,0,0,.18);padding:28px 26px 24px;animation:mII .55s forwards;overflow:hidden;}
    @keyframes fI{from{opacity:0;}to{opacity:1;}}
    @keyframes mII{from{opacity:0;transform:translate(-50%,calc(-50%+52px)) scale(.94);}to{opacity:1;transform:translate(-50%,calc(-50%+28px)) scale(1);}}
    .pmbar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--green),var(--beige));}
    .pmttl{text-align:center;font-size:20px;font-weight:500;color:var(--text-1);margin-bottom:10px;}
    .pmdesc{text-align:center;font-size:16px;color:var(--text-2);line-height:1.6;margin-bottom:26px;}
    .pmok{width:100%;height:52px;background:var(--green);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 4px 6px 0 rgba(107,93,79,.15);}
    .pmok:active{transform:scale(.95);}
    .pmno{width:100%;height:44px;background:var(--beige-l);color:var(--text-2);border:1px solid rgba(123,140,118,.2);border-radius:30px;font-size:16px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:8px;transition:transform .15s;}
    .pmno:active{transform:scale(.95);}

    /* Face Observation Modal — 像素级还原 MaipalAppFinalV3 */
    .fmbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
    .fmbg.hidden{display:none!important;}
    .fmdl{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2000;width:85%;max-width:360px;display:flex;align-items:center;justify-content:center;padding:20px;}
    .fmdl.hidden{display:none!important;}
    .fpnl{background:#f8f3ee;background:rgba(248,243,238,.95);backdrop-filter:blur(4px);border-radius:28px;padding:24px;max-width:360px;width:100%;box-shadow:0 12px 28px 0 rgba(107,93,79,.25);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
    .fcls{position:absolute;top:16px;right:16px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.6);backdrop-filter:blur(4px);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#5a4a3a;line-height:1;transition:transform .15s;}
    .fcls:hover,.fcls:active{transform:scale(.95);}
    .ftitle{margin-bottom:0;position:relative;z-index:10;text-align:center;margin-bottom:16px;}
    .ftitle h2{font-size:24px;font-weight:500;color:#7b8c76;margin-bottom:6px;font-family:'Noto Sans SC',sans-serif;}
    .ftitle p{font-size:15px;color:#6b5d4f;margin:0;font-family:'Noto Sans SC',sans-serif;}
    .cprev{position:relative;width:100%;height:260px;border-radius:22px;overflow:hidden;background:linear-gradient(135deg,#d7c8b0/40,#7b8c76/20);box-shadow:inset 0 2px 8px rgba(0,0,0,.04);margin-bottom:16px;}
    .cprev video,.cprev canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .cprev canvas{display:none;}
    .ffwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .ffr{position:absolute;width:160px;height:200px;border:2px dashed #d7c8b0/80;border-radius:28px;pointer-events:none;box-shadow:0 0 0 2px rgba(215,200,176,.2);}
    .ffr.tongue{width:auto;height:auto;inset:30% 20% 15% 20%;border-radius:45%;}
    /* 四角装饰（原版有） */
    .ffc{display:none;}
    .ffr .ffc{display:block;position:absolute;width:24px;height:24px;}
    .ffr .ffc.tl{top:-2px;left:-2px;border-left:3px solid #D7C8B0;border-top:3px solid #D7C8B0;border-top-left-radius:28px;}
    .ffr .ffc.tr{top:-2px;right:-2px;border-right:3px solid #D7C8B0;border-top:3px solid #D7C8B0;border-top-right-radius:28px;}
    .ffr .ffc.bl{bottom:-2px;left:-2px;border-left:3px solid #D7C8B0;border-bottom:3px solid #D7C8B0;border-bottom-left-radius:28px;}
    .ffr .ffc.br{bottom:-2px;right:-2px;border-right:3px solid #D7C8B0;border-bottom:3px solid #D7C8B0;border-bottom-right-radius:28px;}
    .chint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.3);backdrop-filter:blur(4px);padding:8px 16px;border-radius:9999px;pointer-events:none;}
    .chint p{font-size:13px;color:rgba(255,255,255,.9);margin:0;}
    /* 状态卡片 — 原版：医生头像+状态文字，白底圆角 */
    .fscard{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.8);backdrop-filter:blur(4px);border-radius:18px;padding:16px;margin-bottom:20px;box-shadow:0 4px 8px 0 rgba(107,93,79,.08);}
    .fscard .favtr{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#f8f3ee;display:flex;align-items:center;justify-content:center;}
    .fscard .favtr img{width:48px;height:48px;object-fit:cover;object-top;transform:scale(1.5) translateY(8px);}
    .fscard .fsmain{font-size:15px;font-weight:500;color:#5a4a3a;margin:0 0 4px;font-family:'Noto Sans SC',sans-serif;}
    .fscard .fssub{font-size:13px;color:rgba(107,93,79,.64);margin:0;font-family:'Noto Sans SC',sans-serif;}
    /* 进度圆点 — 原版3个点指示步骤 */
    .fdots{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
    .fdot{width:8px;height:8px;border-radius:50%;background:rgba(215,200,176,.4);transition:all .3s;}
    .fdot.active{background:#7b8c76;}
    .fabtn{flex:1;background:#7b8c76;color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:500;padding:14px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 4px 8px 0 rgba(107,93,79,.2);font-family:'Noto Sans SC',sans-serif;}
    .fabtn:active{transform:scale(.95);}
    .fabtn:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none;}
    .fcst{font-size:13px;text-align:center;margin-top:4px;min-height:18px;color:#6b5d4f;}
    .fcst.err{color:#ef4444;}.fcst.ok{color:#22c55e;}

    /* Voice Listening Modal (v3 exact) */
    .vmbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;animation:fI .45s forwards;backdrop-filter:blur(4px);}
    .vmdl{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:200;width:85%;max-width:360px;}
    .vpnl{background:rgba(248,243,238,.95);backdrop-filter:blur(4px);border-radius:28px;padding:24px;box-shadow:0 12px 28px 0 rgba(107,93,79,.25);position:relative;overflow:hidden;}
    .vcls{position:absolute;top:16px;right:16px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.6);backdrop-filter:blur(4px);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-1);line-height:1;}
    .vhdr{text-align:center;margin-bottom:20px;position:relative;z-index:10;}
    .vhdr h2{font-size:24px;font-weight:500;color:var(--green);margin-bottom:6px;}
    .vhdr p{font-size:15px;color:var(--text-2);}
    .vscript{background:rgba(255,255,255,.9);border-radius:20px;padding:24px;margin-bottom:12px;box-shadow:0 4px 8px 0 rgba(107,93,79,.06);}
    .vscript p{font-size:22px;font-weight:500;color:var(--text-1);text-align:center;line-height:1.6;margin:0;}
    .vhint{text-align:center;font-size:13px;color:rgba(107,93,79,.48);margin-bottom:24px;}
    .vmicarea{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;position:relative;}
    .vbreathe{position:absolute;inset:-16px;border-radius:50%;background:var(--green);animation:bG 2s ease-in-out infinite;pointer-events:none;}
    @keyframes bG{0%,100%{transform:scale(1);opacity:.3;}50%{transform:scale(1.3);opacity:0;}}
    .vmicbtn{width:76px;height:76px;border-radius:50%;background:var(--green);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 12px 0 rgba(107,93,79,.2);position:relative;z-index:10;transition:transform .15s;}
    .vmicbtn:disabled{opacity:.5;cursor:default;}
    .vmicbtn.recording{animation:mSc 1.5s ease-in-out infinite;}
    @keyframes mSc{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
    .vwaves{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;pointer-events:none;}
    .vwaves.l{margin-right:80px;}.vwaves.r{margin-left:80px;}
    .swb{width:4px;height:24px;border-radius:2px;background:rgba(123,140,118,.3);animation:swB .8s ease-in-out infinite;}
    .swb:nth-child(2){animation-delay:.1s;}.swb:nth-child(3){animation-delay:.2s;}
    @keyframes swB{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.5);}}
    .vmstat p{font-size:15px;color:var(--text-2);margin:0;}
    .vtimer{font-size:13px;color:var(--green);margin-top:4px;}
    .vskip{width:100%;background:rgba(255,255,255,.8);backdrop-filter:blur(4px);color:#6b5d4f;border:none;border-radius:16px;font-size:15px;font-weight:500;padding:14px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 4px 6px 0 rgba(107,93,79,.08);font-family:'Noto Sans SC',sans-serif;}
    .vlvl{width:100%;margin-top:8px;}
    .vlvlbar{width:100%;height:6px;border-radius:3px;background:rgba(215,200,176,.5);overflow:hidden;}
    .vlvlin{height:100%;background:linear-gradient(90deg,#22c55e,var(--green));width:0%;transition:width .08s linear;}
    .vrst{font-size:13px;text-align:center;margin-top:8px;min-height:18px;}
    .vrst.err{color:#ef4444;}.vrst.ok{color:#22c55e;}

    /* ====== Bridge CSS: support original JS-generated message classes ====== */
    .message{display:flex;animation:mIn .6s ease-out both;width:100%;}
    .message.user{justify-content:flex-end;}.message.ai{justify-content:flex-start;}
    .message.old .ai-bubble,.message.old .message-content{opacity:.65;}
    .avatar{display:none;}
    .message.user .avatar{display:none;}
    .message-content{max-width:92%;min-width:0;display:flex;flex-direction:column;}
    .message.ai .message-content{align-items:flex-start;}
    .message.user .message-content{align-items:flex-end;}
    .msg-text{
      padding:13px 17px;border-radius:20px;font-size:14px;line-height:26px;
      word-break:break-word;
    }
    .message.ai .msg-text{
      background:rgba(255,255,255,.78);color:var(--text-dk);
      border:1.18px solid rgba(111,184,153,.12);
      box-shadow:0 2px 4px 0 rgba(0,0,0,.05);backdrop-filter:blur(2px);
    }
    .message.user .msg-text{
      background:var(--green);color:#fff;
      box-shadow:0 3px 5px 0 rgba(0,0,0,.08);
    }
    /* Speaker button inside messages */
    .speaker-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:4px 10px;font-size:11px;color:var(--text-2);background:transparent;border:1px solid rgba(123,140,118,.25);border-radius:12px;cursor:pointer;transition:all .2s;line-height:1.4;font-family:inherit;}
    .speaker-btn:hover{color:var(--green);border-color:var(--green);}
    .speaker-btn.speaking{color:#fff;background:var(--green);border-color:var(--green);}
    .speaker-icon{font-size:12px;}
    .speaker-label{font-size:11px;}
    /* 查看报告按钮（与朗读并列） */
    .report-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;margin-left:6px;padding:4px 10px;font-size:11px;color:#fff;background:var(--primary);border:none;border-radius:12px;cursor:pointer;transition:all .2s;line-height:1.4;font-family:inherit;}
    .report-btn:hover{background:var(--primary-dark);transform:scale(.97);}
    .report-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    /* 消息底部操作栏容器 */
    .msg-actions{display:flex;align-items:center;gap:6px;margin-top:8px;}
    /* Loading dots from original JS */
    .loading{display:flex;align-items:center;gap:8px;padding:13px 17px;background:rgba(255,255,255,.78);border-radius:20px;border:1.18px solid rgba(111,184,153,.12);backdrop-filter:blur(2px);}
    .loading-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:lbd .8s ease-in-out infinite;}
    .loading-dot:nth-child(2){animation-delay:.2s;}.loading-dot:nth-child(3){animation-delay:.4s;}
    /* Camera modal bridge: active state = show */
    .fmbg.hidden,.fmdl.hidden{display:none!important;}
    /* Voice modal bridge */
    .vmbg.hidden,.vmdl.hidden{display:none!important;}
    .hidden{display:none!important;}
    /* camStatus visible styling inside v3 modal */
    #camStatus{text-align:center;font-size:13px;color:var(--text-2);margin-top:6px;min-height:18px;}
    #camStatus.err{color:#ef4444;}#camStatus.ok{color:#22c55e;}
  </style>
</head>
<body>
<div class="app-shell" id="appShell">
  <div class="bg-layer"><img src="assets/bg-shanshui.png" alt="" /></div>
  <div class="bg-gradient"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-greeting"><p>你好，朋友</p><p>我是脉医生</p></div>
    <button class="settings-btn" id="clearBtn" title="新问诊">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7b8c76" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>设置</span>
    </button>
  </div>

  <!-- Doctor Character -->
  <div class="doctor-wrap" id="doctorWrap">
    <img class="doctor-img" id="doctorImg" src="assets/mai-standby.gif" alt="脉医生" />
    <div class="listening-badge hidden" id="listeningBadge">正在聆听...</div>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea">
    <div class="messages-inner" id="messagesInner"></div>
  </div>

  <!-- Quick Replies -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- Recording Hint -->
  <div class="recording-hint-bar" id="recordingHint">🎤 正在听您说话... 再次点击麦克风结束</div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="io"></div>
    <div class="ii">
      <input class="ifield" id="userInput" placeholder="输入您的回答..." />
      <button class="micbtn" id="voiceBtn" title="语音输入">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#7b8c76" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
    </div>
    <button class="sbtn" id="sendBtn">
      <!-- 原版 MaipalAppFinalV3 发送按钮：暖沙色圆底 + 白色箭头 -->
      <svg viewBox="0 0 37 37" width="40" height="40"><circle cx="18.5" cy="18.5" r="17" fill="#D7C8B0"/><path d="M12 13l10 5.5-10 5.5v-4h6v-3h-4V13z" fill="#fff"/></svg>
    </button>
  </div>

  <!-- Camera Permission Modal -->
  <div class="pmbg hidden" id="camPermBg"></div>
  <div class="pmmd hidden" id="camPermMd">
    <div class="pmbar"></div>
    <div class="pmttl">"脉伴"想访问您的相机</div>
    <div class="pmdesc">用于面部气色分析，帮助更好地了解您的健康状况</div>
    <button class="pmok" id="camPermOk">允许</button>
    <button class="pmno" id="camPermNo">不允许</button>
  </div>

  <!-- Mic Permission Modal -->
  <div class="pmbg hidden" id="micPermBg"></div>
  <div class="pmmd hidden" id="micPermMd">
    <div class="pmbar"></div>
    <div class="pmttl">"脉伴"想访问您的麦克风</div>
    <div class="pmdesc">用于声音分析，帮助更好地了解您的健康状况</div>
    <button class="pmok" id="micPermOk">允许</button>
    <button class="pmno" id="micPermNo">不允许</button>
  </div>

  <!-- Face Observation Modal (v3 exact + JS-compatible IDs) -->
  <div class="fmbg hidden" id="faceBg"></div>
  <div class="fmdl hidden" id="cameraModal">
    <div class="fpnl">
      <button class="fcls" id="faceCloseBtn">&#10005;</button>
      <!-- Title area: dual ID for v3 looks + JS access -->
      <div class="ftitle">
        <h2 id="camTitle">我先看看您的气色</h2>
        <span id="camIcon" style="display:none"></span>
        <p id="camGuide">请看向屏幕，保持自然表情</p>
      </div>
      <!-- Camera preview -->
      <div class="cprev">
        <video id="camVideo" autoplay playsinline muted></video>
        <canvas id="camCanvas"></canvas>
        <div class="ffwrap"><div class="ffr" id="camFrame">
          <div class="ffc tl"></div><div class="ffc tr"></div><div class="ffc bl"></div><div class="ffc br"></div>
        </div></div>
        <div class="chint"><p>请将面部保持在框内</p></div>
      </div>
      <!-- Status card: shows doctor avatar + status text from JS -->
      <div class="fscard" id="faceScardWrap">
        <div class="favtr"><img src="assets/doctor-oldman.png" alt="脉医生" /></div>
        <div><p class="fsmain" id="faceStMain">脉医生准备看一看</p><p class="fssub" id="faceStSub">建议在光线自然的环境下进行</p></div>
      </div>
      <!-- Status text from original JS (camStatus) → shown inside fscard or below -->
      <div class="fcst" id="camStatus"></div>
      <!-- Progress dots (原版3步骤指示) -->
      <div class="fdots" id="faceDots">
        <div class="fdot active"></div>
        <div class="fdot active"></div>
        <div class="fdot"></div>
      </div>
      <!-- Action buttons: 主操作 + 跳过（保持功能，样式对齐原版） -->
      <button class="fabtn" id="camShoot">拍照分析</button>
      <button class="vskip" id="camSkip">跳过</button>
      <!-- Retry button (hidden by default) -->
      <button class="vskip" id="camRetry" style="display:none;width:100%;margin-top:8px;background:#ef4444;color:#fff;">重试</button>
    </div>
  </div>

  <!-- Voice Listening Modal (v3 exact + JS-compatible IDs) -->
  <div class="vmbg hidden" id="voiceBg"></div>
  <div class="vmdl hidden" id="voiceModal">
    <div class="vpnl">
      <button class="vcls" id="voiceCloseBtn">&#10005;</button>
      <div class="vhdr">
        <h2>听听您的声音</h2>
        <p>请自然读出这句话</p>
      </div>
      <!-- Script text: voiceScriptEl → voiceScript -->
      <div class="vscript"><p id="voiceScript">今天天气很好，我现在感觉还可以。</p></div>
      <p class="vhint">用平时说话的方式读就好</p>
      <!-- Mic button area -->
      <div class="vmicarea">
        <div class="vbreathe hidden" id="voiceBreath"></div>
        <div class="vwaves hidden" id="voiceWavesL"><div class="swb"></div><div class="swb"></div><div class="swb"></div></div>
        <div class="vwaves hidden" id="voiceWavesR"><div class="swb"></div><div class="swb"></div><div class="swb"></div></div>
        <button class="vmicbtn" id="voiceMic">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </button>
      </div>
      <!-- Mic status: countdown + timer -->
      <div class="vmicstat">
        <p id="voiceCountdown">点击开始录音</p>
        <p class="vtimer hidden" id="voiceTimer"></p>
      </div>
      <!-- Level bar -->
      <div class="vlvl"><div class="vlvlbar" id="voiceLevelBar"></div></div>
      <!-- Voice status text -->
      <div class="vrst" id="voiceStatus"></div>
      <!-- Skip + Retry buttons -->
      <button class="vskip" id="voiceSkip">稍后再说</button>
      <button class="vskip" id="voiceRetry" style="display:none;margin-top:8px;background:#ef4444;color:#fff;">重试</button>
    </div>
  </div>

<script>
// ============ State ============
    // ======== v3 Bridge: map original JS IDs → new v3 HTML ========
    (function(){
      // Create missing hidden elements that original JS expects
      var hs = 'position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;';
      // statusText
      var st=document.createElement('div');st.id='statusText';st.style.cssText=hs;document.body.appendChild(st);
      // modelSelect
      var ms=document.createElement('select');ms.id='modelSelect';ms.style.cssText=hs;
      ms.innerHTML='<option value="default" selected>默认</option>';document.body.appendChild(ms);
      // exportBtn (hidden, won't be used in v3 UI)
      var eb=document.createElement('button');eb.id='exportBtn';eb.style.cssText=hs;
      eb.textContent='导出';document.body.appendChild(eb);
      // welcomeScreen placeholder
      var ws=document.createElement('div');ws.id='welcomeScreen';ws.style.cssText=hs;document.body.appendChild(ws);

      // ===== Modal show/hide =====
      // 弹窗显隐已直接在 openCamera/closeCamera/openVoiceModal/closeVoiceModal 中操作 hidden class
      // 不再使用 DOMTokenList monkey-patch

      // Close button wiring
      var fc=document.getElementById('faceCloseBtn');
      if(fc) fc.addEventListener('click',function(){
        if(typeof closeCamera === 'function') closeCamera();
        else {
          var cm=document.getElementById('cameraModal');
          var fb=document.getElementById('faceBg');
          if(cm) cm.classList.add('hidden');
          if(fb) fb.classList.add('hidden');
        }
      });
      var vc=document.getElementById('voiceCloseBtn');
      if(vc) vc.addEventListener('click',function(){
        if(typeof closeVoiceModal === 'function') closeVoiceModal();
        else {
          var vm=document.getElementById('voiceModal');
          var vb=document.getElementById('voiceBg');
          if(vm) vm.classList.add('hidden');
          if(vb) vb.classList.add('hidden');
        }
      });

      // camSkip click → call skipDiagnosis
      var cs=document.getElementById('camSkip');
      if(cs) cs.addEventListener('click',function(){
        if(typeof skipDiagnosis === 'function') skipDiagnosis();
      });
      // voiceSkip click → closeVoiceModal + send skip message
      var vs=document.getElementById('voiceSkip');
      if(vs) vs.addEventListener('click',function(){
        if(typeof closeVoiceModal === 'function') closeVoiceModal();
        addMessage('user','[用户跳过了闻诊]');
      });
    })();

    let messages = []; // [{role, content}]
    let isStreaming = false;
    let abortController = null;
    let personaLoaded = false;

    // Bridge: use v3 elements where original IDs don't exist
    const chatContainer = document.getElementById('messagesArea') || document.querySelector('.messages-area') || window.__v3_chatContainer;
    const messagesWrapper = document.getElementById('messagesInner') || document.querySelector('.messages-inner') || window.__v3_messagesWrapper;
    const welcomeScreen = document.getElementById('welcomeScreen');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');
    const modelSelect = document.getElementById('modelSelect');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');

    // ============ Load Opening Message on startup ============
    async function loadOpening() {
      try {
        const res = await fetch('/api/opening');
        const data = await res.json();
        if (data.opening) {
          personaLoaded = true;
          statusText.textContent = `${data.persona} · 已就绪`;
          // 自动显示开场白
          setTimeout(() => {
            addMessage('ai', data.opening);
          }, 500);
        }
      } catch (e) {
        statusText.textContent = '脉大夫 · 加载失败';
      }
    }

    // ============ Auto-resize textarea ============
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
    });

    // ============ Send Message ============
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isStreaming) return;

      // 停止可能还在朗读的语音
      stopSpeaking();

      // Add user message
      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      // Clear input
      userInput.value = '';
      userInput.style.height = 'auto';
      // 同时清掉语音识别的累积缓存，否则下次输入会带出旧内容
      recognitionFinalText = '';

      // Show loading
      const loadingId = showLoading();

      // Stream response
      isStreaming = true;
      sendBtn.disabled = true;

      try {
        abortController = new AbortController();
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: messages
          }),
          signal: abortController.signal
        });

        removeLoading(loadingId);
        const messageId = addMessage('ai', '');
        const contentEl = document.querySelector(`[data-id="${messageId}"] .msg-text`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                if (parsed.content) {
                  fullContent += parsed.content;
                  contentEl.innerHTML = renderMarkdown(fullContent);
                  scrollToBottom();
                }
              } catch (e) {}
            }
          }
        }

        messages.push({ role: 'assistant', content: fullContent });

        // 检测是否有 tool_call 信号
        const { signal } = extractToolCall(fullContent);
        console.log('🔍 [Signal] fullContent 长度:', fullContent.length);
        console.log('🔍 [Signal] extractToolCall 结果:', JSON.stringify(signal));
        console.log('🔍 [Signal] fullContent 末尾200字:', JSON.stringify(fullContent.slice(-200)));

        // 流式回复完成后自动朗读（仅当用户未手动停止过）
        if (autoReadEnabled) {
          try {
            const msgEl = document.querySelector(`[data-id="${messageId}"]`);
            const btn = msgEl ? msgEl.querySelector('.speaker-btn') : null;
            const speakText = extractToolCall(fullContent).cleaned;
            if (btn && speakText) {
              toggleSpeak(btn, msgEl, speakText);
            }
          } catch (e) { console.warn('auto speak failed', e); }
        } else {
          console.log('[TTS] ⏸ 用户已停止自动朗读，跳过本条消息');
        }

        // 处理信号
        if (signal && signal.action) {
          console.log('✅ [Signal] 收到有效信号，准备触发:', signal.action, '600ms 后执行 handleSignal');
          // 等朗读开始一点再弹出摄像头，体验更顺
          setTimeout(() => handleSignal(signal), 600);
        } else {
          console.log('⚠️ [Signal] 无信号或 signal.action 为空, signal =', JSON.stringify(signal));
        }

      } catch (err) {
        if (err.name !== 'AbortError') {
          removeLoading(loadingId);
          addMessage('ai', '抱歉，出错了：' + err.message);
        }
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        abortController = null;
      }
    }

    // ============ UI Helpers ============
    function addMessage(role, content) {
      const id = 'msg-' + Date.now();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.dataset.id = id;
      // AI 消息带操作栏（朗读+报告）
      const actionsHtml = role === 'ai'
        ? `<div class="msg-actions">
            <button class="speaker-btn" data-action="speak" title="朗读此回复"><span class="speaker-icon">🔊</span><span class="speaker-label">朗读</span></button>
          </div>`
        : '';
      div.innerHTML = `
        <div class="message-content">
          <div class="msg-text">${content ? renderMarkdown(content) : ''}</div>
          ${actionsHtml}
        </div>
      `;
      messagesWrapper.appendChild(div);
      if (role === 'ai') {
        const btn = div.querySelector('.speaker-btn');
        if (btn) btn.addEventListener('click', () => toggleSpeak(btn, div));
      }
      scrollToBottom();
      return id;
    }

    /* 给指定消息追加「查看报告」按钮 */
    function addReportButton(messageId, reportData) {
      const msgEl = document.querySelector(`[data-id="${messageId}"]`);
      if (!msgEl) return;
      const actions = msgEl.querySelector('.msg-actions');
      if (!actions) return;
      // 避免重复添加
      if (actions.querySelector('.report-btn')) return;
      const btn = document.createElement('button');
      btn.className = 'report-btn';
      btn.title = '查看完整调理报告';
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>查看报告`;
      btn.addEventListener('click', () => openReportPage(reportData));
      actions.appendChild(btn);
    }

    function showLoading() {
      const id = 'loading-' + Date.now();
      const div = document.createElement('div');
      div.className = 'message ai';
      div.dataset.loadingId = id;
      div.innerHTML = `
        <div class="message-content">
          <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      `;
      messagesWrapper.appendChild(div);
      scrollToBottom();
      return id;
    }

    function removeLoading(id) {
      const el = document.querySelector(`[data-loading-id="${id}"]`);
      if (el) el.remove();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 从文本中提取 tool_call JSON，并返回剥离后的文本
    function extractToolCall(text) {
      const re = /```tool_call\s*([\s\S]*?)```/i;
      const m = text.match(re);
      if (!m) return { cleaned: text, signal: null };
      let signal = null;
      try { signal = JSON.parse(m[1].trim()); } catch (e) { console.warn('tool_call JSON 解析失败:', e); }
      const cleaned = text.replace(re, '').trim();
      return { cleaned, signal };
    }

    function renderMarkdown(text) {
      // 先剥离 tool_call 代码块（防止流式过程中露出来）
      const { cleaned } = extractToolCall(text);
      return cleaned
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n/g, '<br>');
    }

    // ============ Event Listeners ============
    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener('click', () => {
      if (confirm('确定要开始新的问诊吗？当前对话将被清空。')) {
        messages = [];
        // v3: just reload to reset everything cleanly
        location.reload();
      }
    });

    // v3 bridge: wire up close buttons for new modals
    var fClose = document.getElementById('faceCloseBtn');
    if(fClose) fClose.addEventListener('click', function(){
      var cm = document.getElementById('cameraModal');
      if(cm && typeof closeCamera === 'function') closeCamera();
      else if(cm){ cm.classList.remove('active'); cm.classList.add('hidden');
        var fb=document.getElementById('faceBg'); if(fb){fb.classList.add('hidden');} }
    });
    var vClose = document.getElementById('voiceCloseBtn');
    if(vClose) vClose.addEventListener('click', function(){
      var vm = document.getElementById('voiceModal');
      if(vm && typeof closeVoiceModal === 'function') closeVoiceModal();
      else if(vm){ vm.classList.remove('active'); vm.classList.add('hidden');
        var vb=document.getElementById('voiceBg'); if(vb){vb.classList.add('hidden');} }
    });

    exportBtn.addEventListener('click', () => {
      if (messages.length === 0) {
        alert('还没有对话记录');
        return;
      }
      let md = '# 脉大夫问诊记录\n\n';
      md += `**时间**: ${new Date().toLocaleString()}\n\n`;
      md += '---\n\n';
      for (const msg of messages) {
        if (msg.role === 'user') {
          md += `**患者**: ${msg.content}\n\n`;
        } else {
          md += `**脉大夫**: ${msg.content}\n\n`;
        }
      }
      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `脉大夫问诊记录-${new Date().toISOString().slice(0, 10)}.md`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // ============ 🎤 Voice Input (STT) ============
    const voiceBtn = document.getElementById('voiceBtn');
    const recordingHint = document.getElementById('recordingHint');
    let recognition = null;
    let isRecording = false;
    let recognitionFinalText = '';

    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        voiceBtn.disabled = true;
        voiceBtn.title = '当前浏览器不支持语音识别，建议使用 Chrome/Edge/Safari';
        voiceBtn.style.opacity = '0.4';
        return null;
      }
      const r = new SR();
      r.lang = 'zh-CN';
      r.continuous = true;
      r.interimResults = true;
      r.maxAlternatives = 1;

      r.onstart = () => {
        isRecording = true;
        recognitionFinalText = '';
        voiceBtn.classList.add('recording');
        // 录音时麦克风图标变红（通过CSS .micbtn.recording svg 控制）
        recordingHint.classList.add('active');
      };

      r.onresult = (e) => {
        // 只有正在录音时才更新输入框，避免停止后延迟回调污染
        if (!isRecording) return;
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            recognitionFinalText += t;
          } else {
            interim += t;
          }
        }
        userInput.value = recognitionFinalText + interim;
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
      };

      r.onerror = (e) => {
        console.warn('语音识别错误:', e.error);
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          alert('请允许使用麦克风权限后重试');
        } else if (e.error === 'no-speech') {
          // 没说话，静默处理
        }
        stopRecognition();
      };

      r.onend = () => {
        stopRecognition();
        // 识别结束后，如果有内容且页面允许，自动发送
        const text = userInput.value.trim();
        if (text && !isStreaming) {
          setTimeout(() => sendMessage(), 200);
        }
      };

      return r;
    }

    function startRecognition() {
      if (!recognition) recognition = initRecognition();
      if (!recognition) return;
      // 启动前停止 TTS，避免边说边朗读
      try { window.speechSynthesis.cancel(); } catch (e) {}
      try {
        recognition.start();
      } catch (e) {
        console.warn('启动录音失败:', e);
      }
    }

    function stopRecognition() {
      isRecording = false;
      voiceBtn.classList.remove('recording');

      recordingHint.classList.remove('active');
      if (recognition) {
        try { recognition.stop(); } catch (e) {}
      }
    }

    voiceBtn.addEventListener('click', () => {
      if (isRecording) {
        stopRecognition();
      } else {
        startRecognition();

    });

    // ============ 🧑‍⚕️ Doctor GIF State ============
    const doctorImg = document.getElementById('doctorImg');
    const DOCTOR_GIF = {
      standby: 'assets/mai-standby.gif',
      speaking: 'assets/mai-speaking.gif'
    };
    let currentDoctorState = 'standby';

    // 预加载 speaking GIF，避免首次切换时闪白
    const _preloadSpeaking = new Image();
    _preloadSpeaking.src = DOCTOR_GIF.speaking;

    function setDoctorState(state) {
      if (state === currentDoctorState) return;
      if (!DOCTOR_GIF[state]) return;
      currentDoctorState = state;
      // 淡出 → 切换 src → 淡入，过渡自然
